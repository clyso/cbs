name: Release CBC Binary

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to build (e.g., v1.0.0)"
        required: true
        type: string

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target_name: linux-amd64
          - os: macos-14
            target_name: macos-arm64

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          # if triggered manually, checkout the specific tag input.
          # if triggered by push, this is empty, so it defaults to the pushed tag.
          ref: ${{ inputs.tag_name }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up Python
        run: uv python install 3.13

      - name: Install Dependencies
        run: |
          uv sync --dev --package cbc --package cbsdcore

      - name: Run Build Script
        run: |
          chmod +x ./cbc/tools/build.sh
          ./cbc/tools/build.sh

      - name: Prepare Artifacts
        shell: bash
        run: |
          # try to get tag from input (manual run); fallback to GITHUB_REF (push run)
          TAG_NAME="${{ inputs.tag_name }}"

          if [ -z "$TAG_NAME" ]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
          fi

          echo "Building for Tag: $TAG_NAME"

          cd cbc/dist

          # 1. Create the VERSIONED copy (e.g. cbc-v1.0.0-linux-amd64)
          cp cbc cbc-${TAG_NAME}-${{ matrix.target_name }}

          # 2. Create the VERSIONLESS copy (e.g. cbc-linux-amd64)
          cp cbc cbc-${{ matrix.target_name }}

      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          # NOTE: when rebuilding a tag, this action updates the existing release
          # and re-uploads the assets.
          tag_name: ${{ inputs.tag_name }} # Optional: explicit tag target for manual runs
          files: |
            # upload the versioned binary
            cbc/dist/cbc-${{ inputs.tag_name || github.ref_name }}-${{ matrix.target_name }}

            # upload the versionless binary
            cbc/dist/cbc-${{ matrix.target_name }}
          generate_release_notes: true
